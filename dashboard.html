  .grid {

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .card h2 { font-size: 14px; margin: 0 0 12px; color: var(--text); }
  .card.wide { grid-column: 1 / -1; }
  table {
    width: 100%;

    font-size: 12px;
  }
  th, td {
    text-align: left;
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);

    padding: 6px 10px;
    font-size: 13px;

  .badge {

    padding: 2px 6px;

const cols = ["주문번호","주문일","지역","담당자","제품분류","제품명","단가","판매수량","매출액","영업이익","이익률","월목표액","목표달성률"];
let rows = csvText.trim().split("\n").map(line => {
  const v = line.split(",");
  return {
    주문번호: v[0], 주문일: v[1], 지역: v[2], 담당자: v[3], 제품분류: v[4], 제품명: v[5],
    단가: +v[6], 판매수량: +v[7], 매출액: +v[8], 영업이익: +v[9], 이익률: +v[10],
    월목표액: +v[11], 목표달성률: +v[12]
  };
}).filter(r => r.담당자 !== "미확인");

const fmt = n => Math.round(n).toLocaleString("ko-KR");
const fmtPct = n => n.toFixed(1) + "%";

function unique(arr, key) { return [...new Set(arr.map(r => r[key]))].sort(); }

function populateFilters() {
  const regions = unique(rows, "지역");
  const cats = unique(rows, "제품분류");
  const reps = unique(rows, "담당자");
  const fillSelect = (id, list) => {
    const sel = document.getElementById(id);
    list.forEach(v => {
      const opt = document.createElement("option");
      opt.value = v; opt.textContent = v;
      sel.appendChild(opt);
    });
  };
  fillSelect("filterRegion", regions);
  fillSelect("filterCategory", cats);
  fillSelect("filterRep", reps);
}

let charts = {};
function destroyCharts() { Object.values(charts).forEach(c => c.destroy()); charts = {}; }

const palette = ["#38bdf8","#34d399","#fbbf24","#f87171","#a78bfa","#fb923c","#22d3ee","#f472b6"];

function getFiltered() {
  const r = document.getElementById("filterRegion").value;
  const c = document.getElementById("filterCategory").value;
  const p = document.getElementById("filterRep").value;
  return rows.filter(row =>
    (!r || row.지역 === r) && (!c || row.제품분류 === c) && (!p || row.담당자 === p)
  );
}

function render() {
  destroyCharts();
  const data = getFiltered();

  // KPI
  const totalRevenue = data.reduce((s,r)=>s+r.매출액,0);
  const totalProfit = data.reduce((s,r)=>s+r.영업이익,0);
  const totalQty = data.reduce((s,r)=>s+r.판매수량,0);
  const avgMargin = totalRevenue ? (totalProfit/totalRevenue*100) : 0;
  const totalTarget = data.reduce((s,r)=>s+r.월목표액,0);
  const achievementRate = totalTarget ? (totalRevenue/totalTarget*100) : 0;
  const orderCount = data.length;

  document.getElementById("kpiGrid").innerHTML = `
    <div class="kpi-card"><div class="kpi-label">총 매출액</div><div class="kpi-value">${fmt(totalRevenue)}원</div></div>
    <div class="kpi-card"><div class="kpi-label">총 영업이익</div><div class="kpi-value">${fmt(totalProfit)}원</div></div>
    <div class="kpi-card"><div class="kpi-label">평균 이익률</div><div class="kpi-value">${fmtPct(avgMargin)}</div></div>
    <div class="kpi-card"><div class="kpi-label">총 판매수량</div><div class="kpi-value">${fmt(totalQty)}개</div></div>
    <div class="kpi-card"><div class="kpi-label">주문 건수</div><div class="kpi-value">${orderCount}건</div></div>
    <div class="kpi-card"><div class="kpi-label">목표 달성률</div><div class="kpi-value ${achievementRate>=100?'pos':'neg'}">${fmtPct(achievementRate)}</div></div>
  `;

  // 월별 매출
  const months = [...new Set(data.map(r=>r.주문일))].sort();
  const monthlyRevenue = months.map(m => data.filter(r=>r.주문일===m).reduce((s,r)=>s+r.매출액,0));
  const monthlyTarget = months.map(m => data.filter(r=>r.주문일===m).reduce((s,r)=>s+r.월목표액,0));
  charts.monthly = new Chart(document.getElementById("monthlyChart"), {
    type: "line",
    data: { labels: months, datasets: [
      { label: "매출액", data: monthlyRevenue, borderColor: palette[0], backgroundColor: "rgba(56,189,248,0.15)", fill:true, tension:0.3 },
      { label: "목표액", data: monthlyTarget, borderColor: palette[3], borderDash:[5,5], fill:false, tension:0.3 }
    ]},
    options: { plugins:{legend:{labels:{color:"#e2e8f0"}}}, scales:{ x:{ticks:{color:"#94a3b8"}}, y:{ticks:{color:"#94a3b8"}} } }
  });

  // 지역별 매출
  const regions = unique(data, "지역");
  const regionRevenue = regions.map(r => data.filter(d=>d.지역===r).reduce((s,d)=>s+d.매출액,0));
  charts.region = new Chart(document.getElementById("regionChart"), {
    type: "doughnut",
    data: { labels: regions, datasets: [{ data: regionRevenue, backgroundColor: palette }] },
    options: { plugins:{legend:{position:"right",labels:{color:"#e2e8f0"}}} }
  });

  // 제품분류별 매출
  const cats = unique(data, "제품분류");
  const catRevenue = cats.map(c => data.filter(d=>d.제품분류===c).reduce((s,d)=>s+d.매출액,0));
  charts.category = new Chart(document.getElementById("categoryChart"), {
    type: "bar",
    data: { labels: cats, datasets: [{ label:"매출액", data: catRevenue, backgroundColor: palette[1] }] },
    options: { plugins:{legend:{display:false}}, scales:{ x:{ticks:{color:"#94a3b8"}}, y:{ticks:{color:"#94a3b8"}} } }
  });

  // 담당자별 매출 vs 목표
  const reps = unique(data, "담당자");
  const repRevenue = reps.map(p => data.filter(d=>d.담당자===p).reduce((s,d)=>s+d.매출액,0));
  const repTarget = reps.map(p => data.filter(d=>d.담당자===p).reduce((s,d)=>s+d.월목표액,0));
  charts.rep = new Chart(document.getElementById("repChart"), {
    type: "bar",
    data: { labels: reps, datasets: [
      { label:"매출액", data: repRevenue, backgroundColor: palette[0] },
      { label:"목표액", data: repTarget, backgroundColor: palette[2] }
    ]},
    options: { plugins:{legend:{labels:{color:"#e2e8f0"}}}, scales:{ x:{ticks:{color:"#94a3b8"}}, y:{ticks:{color:"#94a3b8"}} } }
  });

  // 제품별 매출 TOP10
  const products = unique(data, "제품명");
  const prodRevenue = products.map(p => ({ name:p, revenue: data.filter(d=>d.제품명===p).reduce((s,d)=>s+d.매출액,0) }))
    .sort((a,b)=>b.revenue-a.revenue).slice(0,10);
  charts.product = new Chart(document.getElementById("productChart"), {
    type: "bar",
    data: { labels: prodRevenue.map(p=>p.name), datasets: [{ label:"매출액", data: prodRevenue.map(p=>p.revenue), backgroundColor: palette[4] }] },
    options: { indexAxis:"y", plugins:{legend:{display:false}}, scales:{ x:{ticks:{color:"#94a3b8"}}, y:{ticks:{color:"#94a3b8"}} } }
  });

  // 월별 목표 달성률
  const achievement = months.map((m,i) => monthlyTarget[i] ? (monthlyRevenue[i]/monthlyTarget[i]*100) : 0);
  charts.achievement = new Chart(document.getElementById("achievementChart"), {
    type: "bar",
    data: { labels: months, datasets: [{ label:"달성률(%)", data: achievement,
      backgroundColor: achievement.map(v => v>=100 ? "#34d399" : "#f87171") }] },
    options: { plugins:{legend:{display:false}}, scales:{ x:{ticks:{color:"#94a3b8"}}, y:{ticks:{color:"#94a3b8"}} } }
  });

  // 테이블
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = data.slice(0,50).map(r => `
    <tr>
      <td>${r.주문번호}</td><td>${r.주문일}</td><td>${r.지역}</td><td>${r.담당자}</td>
      <td>${r.제품분류}</td><td>${r.제품명}</td>
      <td class="num">${r.판매수량}</td><td class="num">${fmt(r.매출액)}</td>
      <td class="num">${fmt(r.영업이익)}</td>
      <td class="num">${r.이익률 < 20 ? `<span class="badge warn">${fmtPct(r.이익률)}</span>` : fmtPct(r.이익률)}</td>
    </tr>
  `).join("");
}

populateFilters();
["filterRegion","filterCategory","filterRep"].forEach(id =>
  document.getElementById(id).addEventListener("change", render)
);
render();
</script>
